<!-- Ошибка -->
{% if errors %}
<div class="bg-white rounded-xl shadow p-4 mt-8">
    <h2 class="text-xl font-semibold mb-3">Последние ошибки</h2>

    <ul class="text-sm">
        {% for e in errors %}
        <li class="mb-2">
            <span class="font-semibold">{{ e.created_at }}</span> —
            <span class="text-red-700">{{ e.error|truncatechars:200 }}</span>
        </li>
        {% endfor %}
    </ul>
</div>
{% endif %}
